apis:
  - aid: portkey:portkey
    name: Portkey
    tags:
      - AI Gateways
      - Governance
      - Guardrails
      - Observability
      - Prompt Management
    humanURL: https://portkey.ai/
    properties:
      - url: https://portkey.ai/docs/introduction/what-is-portkey
        type: Documentation
      - url: https://portkey.ai/docs/api-reference/inference-api/chat
        type: APIReference
      - url: openapi/portkey-openapi.yml
        type: OpenAPI
      - url: https://portkey.ai/docs/guides/getting-started/getting-started-with-ai-gateway
        type: GettingStarted
    description: >-
      Portkey equips AI teams with everything they need to go to production - Gateway, Observability, Guardrails,
      Governance, and Prompt Management, all in one platform.
  - aid: portkey:portkey-inference-api
    name: Portkey Inference API
    tags:
      - AI Gateways
      - Assistants
      - Audio
      - Batch
      - Chat Completions
      - Completions
      - Embeddings
      - Fine-Tuning
      - Images
      - Inference
      - Moderations
    humanURL: https://portkey.ai/docs/product/ai-gateway/universal-api
    baseURL: https://api.portkey.ai/v1
    properties:
      - url: https://portkey.ai/docs/api-reference/inference-api/chat
        type: APIReference
      - url: https://portkey.ai/docs/api-reference/inference-api/completions
        type: APIReference
      - url: https://portkey.ai/docs/api-reference/inference-api/embeddings
        type: APIReference
      - url: openapi/portkey-openapi.yml
        type: OpenAPI
    description: >-
      Portkey Inference API provides a universal API for routing to 200+ LLMs across chat completions, completions,
      embeddings, images, audio, assistants, fine-tuning, batch processing, and moderations endpoints with a single
      unified interface. Supports OpenAI, Anthropic, and Portkey API formats with automatic translation between
      providers.
  - aid: portkey:portkey-admin-api
    name: Portkey Admin API
    tags:
      - Administration
      - Analytics
      - API Keys
      - Audit Logs
      - Configs
      - Logs
      - Rate Limits
      - Users
      - Virtual Keys
      - Workspaces
    humanURL: https://portkey.ai/docs/api-reference/admin-api/introduction
    baseURL: https://api.portkey.ai/v1
    properties:
      - url: https://portkey.ai/docs/api-reference/admin-api/introduction
        type: APIReference
      - url: openapi/portkey-openapi.yml
        type: OpenAPI
    description: >-
      Portkey Admin API enables programmatic management of Portkey organizations and workspaces, including resource
      management for configs, virtual keys, and API keys, analytics and monitoring for usage statistics and performance
      trends, and user and workspace administration for managing accounts, permissions, and team membership. Includes
      audit logging of all administrative operations.
