openapi: 3.0.0
info:
  title: Portkey Analytics > Graphs User-invites API
  description: The Portkey REST API. Please see https://portkey.ai/docs/api-reference for more details.
  version: 2.0.0
  termsOfService: https://portkey.ai/terms
  contact:
    name: Portkey Developer Forum
    url: https://portkey.wiki/community
  license:
    name: MIT
    url: https://github.com/Portkey-AI/portkey-openapi/blob/master/LICENSE
servers:
- url: https://api.portkey.ai/v1
  description: Portkey API Public Endpoint
security:
- Portkey-Key: []
tags:
- name: User-invites
  description: Create and manage user invites.
paths:
  /admin/users/invites:
    servers:
    - url: https://api.portkey.ai/v1
      description: Portkey API Public Endpoint
    - url: SELF_HOSTED_CONTROL_PLANE_URL
      description: Self-Hosted Control Plane URL
    post:
      operationId: Invites_create
      summary: Invite User
      description: Send an invite to user for your organization
      parameters: []
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SuccessInvite'
      tags:
      - User-invites
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateInvite'
      x-code-samples:
      - lang: python
        label: Default
        source: "from portkey_ai import Portkey\n\n# Initialize the Portkey client\nportkey = Portkey(\n    api_key=\"PORTKEY_API_KEY\",\n)\n\n# Add a user invite\nuser = portkey.admin.users.invites.create(\n    email=\"user@example.com\",\n    role=\"member\",\n    workspaces=[\n        {\n            \"id\": \"WORKSPACE_SLUG\",\n            \"role\": \"admin\"\n        }\n    ],\n    workspace_api_key_details={\n        \"scopes\": [\n            \"workspaces.list\",\n            \"logs.export\",\n            \"logs.list\",\n            \"logs.view\",\n        ]\n    }\n)\n\nprint(user)\n"
      - lang: javascript
        label: Default
        source: "import { Portkey } from \"portkey-ai\";\n\nconst portkey = new Portkey({\n    apiKey: \"PORTKEY_API_KEY\",\n})\n\nconst user=await portkey.admin.users.invites.create({\n    email:\"user@example.com\",\n    role: \"member\",\n    workspaces: [\n    {\n    id:\"WORKSPACE_SLUG\",\n    role:\"admin\"\n    }],\n    workspace_api_key_details:{\n        scopes: [\n        \"workspaces.list\",\n        \"logs.export\",\n        \"logs.list\",\n        \"logs.view\",\n    ]\n    }\n})\n\nconsole.log(user);\n"
      - lang: curl
        label: Default
        source: "curl -X POST https://api.portkey.ai/v1/admin/users/invites\n-H \"x-portkey-api-key: PORTKEY_API_KEY\"\n-H \"Content-Type: application/json\"\n-d '{\n    \"email\": \"user@example.com\",\n    \"role\": \"member\",\n    \"workspaces\": [\n        {\n            \"id\": \"WORKSPACE_SLUG\",\n            \"role\": \"admin\"\n        }\n    ],\n    \"workspace_api_key_details\": {\n        \"scopes\": [\n            \"workspaces.list\",\n            \"logs.export\",\n            \"logs.list\",\n            \"logs.view\"\n        ]\n    }\n}'\n"
      - lang: curl
        label: Self-Hosted
        source: "curl -X POST SELF_HOSTED_CONTROL_PLANE_URL/admin/users/invites\n-H \"x-portkey-api-key: PORTKEY_API_KEY\"\n-H \"Content-Type: application/json\"\n-d '{\n    \"email\": \"user@example.com\",\n    \"role\": \"member\",\n    \"workspaces\": [\n        {\n            \"id\": \"WORKSPACE_SLUG\",\n            \"role\": \"admin\"\n        }\n    ],\n    \"workspace_api_key_details\": {\n        \"scopes\": [\n            \"workspaces.list\",\n            \"logs.export\",\n            \"logs.list\",\n            \"logs.view\"\n        ]\n    }\n}'\n"
      - lang: python
        label: Self-Hosted
        source: "from portkey_ai import Portkey\n\n# Initialize the Portkey client\nportkey = Portkey(\n    api_key=\"PORTKEY_API_KEY\",\n    base_url=\"SELF_HOSTED_CONTROL_PLANE_URL\"\n)\n\n# Add a user invite\nuser = portkey.admin.users.invites.create(\n    email=\"user@example.com\",\n    role=\"member\",\n    workspaces=[\n        {\n            \"id\": \"WORKSPACE_SLUG\",\n            \"role\": \"admin\"\n        }\n    ],\n    workspace_api_key_details={\n        \"scopes\": [\n            \"workspaces.list\",\n            \"logs.export\",\n            \"logs.list\",\n            \"logs.view\",\n        ]\n    }\n)\n\nprint(user)\n"
      - lang: javascript
        label: Self-Hosted
        source: "import { Portkey } from \"portkey-ai\";\n\nconst portkey = new Portkey({\n    apiKey: \"PORTKEY_API_KEY\",\n    baseUrl: \"SELF_HOSTED_CONTROL_PLANE_URL\"\n})\n\nconst user = await portkey.admin.users.invites.create({\n    email: \"user@example.com\",\n    role: \"member\",\n    workspaces: [\n        {\n            id: \"WORKSPACE_SLUG\",\n            role: \"admin\"\n        }\n    ],\n    workspace_api_key_details: {\n        scopes: [\n            \"workspaces.list\",\n            \"logs.export\",\n            \"logs.list\",\n            \"logs.view\",\n        ]\n    }\n})\n\nconsole.log(user);\n"
    get:
      tags:
      - User-invites
      summary: Get All Invites
      parameters:
      - name: pageSize
        in: query
        schema:
          type: integer
        example: '1'
      - name: currentPage
        in: query
        schema:
          type: integer
        example: '0'
      - name: role
        in: query
        schema:
          type: string
          enum:
          - admin
          - member
        example: admin
      - name: email
        in: query
        schema:
          type: string
          format: email
        example: foo@bar.com
      - name: status
        in: query
        schema:
          type: string
          enum:
          - pending
          - cancelled
          - accepted
          - expired
        example: pending
      responses:
        '200':
          description: OK
          headers:
            Content-Type:
              schema:
                type: string
                example: application/json
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/InviteList'
              example:
                object: list
                total: 2
                data:
                - object: invite
                  id: 419641fb-1458-47d6-94d0-e308159b3ec2
                  email: horace.slughorn@example.com
                  role: member
                  created_at: '2023-12-12 13:56:32'
                  expires_at: '2023-12-12 13:56:32'
                  accepted_at: '2023-12-12 13:56:32'
                  status: pending
                  invited_by: a90e74fb-269e-457b-8b59-9426cdd8907e
                  workspaces:
                  - workspace_id: ''
                    role: ''
      x-code-samples:
      - lang: python
        label: Default
        source: "from portkey_ai import Portkey\n\n# Initialize the Portkey client\nportkey = Portkey(\n    api_key=\"PORTKEY_API_KEY\",\n)\n\n# List user invites\nuser_invites = portkey.admin.users.invites.list(\n    email=\"user@example.com\"\n)\n\nprint(user_invites)\n"
      - lang: javascript
        label: Default
        source: "import { Portkey } from \"portkey-ai\";\n\nconst portkey = new Portkey({\n    apiKey: \"PORTKEY_API_KEY\",\n})\n\nconst user=await portkey.admin.users.invites.list({\n    email:\"user@example.com\"\n});\nconsole.log(user);\n"
      - lang: curl
        label: Default
        source: "curl -X GET \"https://api.portkey.ai/v1/admin/users/invites?email=user@example.com\"\n  -H \"x-portkey-api-key: PORTKEY_API_KEY\"\n"
      - lang: curl
        label: Self-Hosted
        source: "curl -X GET \"SELF_HOSTED_CONTROL_PLANE_URL/admin/users/invites?email=user@example.com\"\n  -H \"x-portkey-api-key: PORTKEY_API_KEY\"\n"
      - lang: python
        label: Self-Hosted
        source: "from portkey_ai import Portkey\n\n# Initialize the Portkey client\nportkey = Portkey(\n    api_key=\"PORTKEY_API_KEY\",\n    base_url=\"SELF_HOSTED_CONTROL_PLANE_URL\"\n)\n\n# List user invites\nuser_invites = portkey.admin.users.invites.list(\n    email=\"user@example.com\"\n)\n\nprint(user_invites)\n"
      - lang: javascript
        label: Self-Hosted
        source: "import { Portkey } from \"portkey-ai\";\n\nconst portkey = new Portkey({\n    apiKey: \"PORTKEY_API_KEY\",\n    baseUrl: \"SELF_HOSTED_CONTROL_PLANE_URL\"\n})\n\nconst user=await portkey.admin.users.invites.list({\n    email:\"user@example.com\"\n});\nconsole.log(user);\n"
  /admin/users/invites/{inviteId}:
    servers:
    - url: https://api.portkey.ai/v1
      description: Portkey API Public Endpoint
    - url: SELF_HOSTED_CONTROL_PLANE_URL
      description: Self-Hosted Control Plane URL
    get:
      tags:
      - User-invites
      summary: Get Invite
      parameters:
      - name: inviteId
        in: path
        schema:
          type: string
        required: true
        description: string
      responses:
        '200':
          description: OK
          headers:
            Content-Type:
              schema:
                type: string
                example: application/json
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Invite'
              example:
                object: invite
                id: 419641fb-1458-47d6-94d0-e308159b3ec2
                email: horace.slughorn@example.com
                role: member
                created_at: '2023-12-12 13:56:32'
                expires_at: '2023-12-12 13:56:32'
                accepted_at: '2023-12-12 13:56:32'
                status: pending
                invited_by: 8dcfa174-c5ed-42c7-8a63-be755cc6e3123
                workspaces:
                - workspace_id: ''
                  role: ''
      x-code-samples:
      - lang: python
        label: Default
        source: "from portkey_ai import Portkey\n\n# Initialize the Portkey client\nportkey = Portkey(\n    api_key=\"PORTKEY_API_KEY\",\n)\n\n# Get a user invite\nuser = portkey.admin.users.invites.retrieve(\n    invite_id='INVITE_ID'\n)\n\nprint(user)\n"
      - lang: javascript
        label: Default
        source: "import { Portkey } from \"portkey-ai\";\n\nconst portkey = new Portkey({\n    apiKey: \"PORTKEY_API_KEY\",\n})\n\nconst user=await portkey.admin.users.invites.retrieve({\n    inviteId: 'INVITE_ID',\n});\nconsole.log(user);\n"
      - lang: curl
        label: Default
        source: "curl -X GET \"https://api.portkey.ai/v1/admin/users/invites/INVITE_ID\"\n  -H \"x-portkey-api-key: PORTKEY_API_KEY\"\n"
      - lang: curl
        label: Self-Hosted
        source: "curl -X GET \"SELF_HOSTED_CONTROL_PLANE_URL/admin/users/invites/INVITE_ID\"\n  -H \"x-portkey-api-key: PORTKEY_API_KEY\"\n"
      - lang: python
        label: Self-Hosted
        source: "from portkey_ai import Portkey\n\n# Initialize the Portkey client\nportkey = Portkey(\n    api_key=\"PORTKEY_API_KEY\",\n    base_url=\"SELF_HOSTED_CONTROL_PLANE_URL\"\n)\n\n# Get a user invite\nuser = portkey.admin.users.invites.retrieve(\n    invite_id='INVITE_ID'\n)\n\nprint(user)\n"
      - lang: javascript
        label: Self-Hosted
        source: "import { Portkey } from \"portkey-ai\";\n\nconst portkey = new Portkey({\n    apiKey: \"PORTKEY_API_KEY\",\n    baseUrl: \"SELF_HOSTED_CONTROL_PLANE_URL\"\n})\n\nconst user=await portkey.admin.users.invites.retrieve({\n    inviteId: 'INVITE_ID',\n});\nconsole.log(user);\n"
    delete:
      tags:
      - User-invites
      summary: Delete Invite By ID
      parameters:
      - name: inviteId
        in: path
        schema:
          type: string
        required: true
      responses:
        '200':
          description: OK
          headers:
            Content-Type:
              schema:
                type: string
                example: application/json
          content:
            application/json:
              schema:
                type: object
              example: {}
      x-code-samples:
      - lang: python
        label: Default
        source: "from portkey_ai import Portkey\n\n# Initialize the Portkey client\nportkey = Portkey(\n    api_key=\"PORTKEY_API_KEY\",\n)\n\n\n\n# Delete a user invite\nuser = portkey.admin.users.invites.delete(\n    invite_id=\"INVITE_ID\"\n)\n\nprint(user)\n"
      - lang: javascript
        label: Default
        source: "import { Portkey } from \"portkey-ai\";\n\nconst portkey = new Portkey({\n    apiKey: \"PORTKEY_API_KEY\",\n})\n\nconst user=await portkey.admin.users.invites.delete({\n    inviteId:\"INVITE_ID\"\n})\n\nconsole.log(user);\n"
      - lang: curl
        label: Default
        source: "curl -X DELETE \"https://api.portkey.ai/v1/admin/users/invites/INVITE_ID\"\n  -H \"x-portkey-api-key: PORTKEY_API_KEY\"\n"
      - lang: curl
        label: Self-Hosted
        source: "curl -X DELETE \"SELF_HOSTED_CONTROL_PLANE_URL/admin/users/invites/INVITE_ID\"\n  -H \"x-portkey-api-key: PORTKEY_API_KEY\"\n"
      - lang: python
        label: Self-Hosted
        source: "from portkey_ai import Portkey\n\n# Initialize the Portkey client\nportkey = Portkey(\n    api_key=\"PORTKEY_API_KEY\",\n    base_url=\"SELF_HOSTED_CONTROL_PLANE_URL\"\n)\n\n# Delete a user invite\nuser = portkey.admin.users.invites.delete(\n    invite_id=\"INVITE_ID\"\n)\n\nprint(user)\n"
      - lang: javascript
        label: Self-Hosted
        source: "import { Portkey } from \"portkey-ai\";\n\nconst portkey = new Portkey({\n    apiKey: \"PORTKEY_API_KEY\",\n    baseUrl: \"SELF_HOSTED_CONTROL_PLANE_URL\"\n})\n\nconst user=await portkey.admin.users.invites.delete({\n    inviteId:\"INVITE_ID\"\n})\n\nconsole.log(user);\n"
  /admin/users/invites/{inviteId}/resend:
    servers:
    - url: https://api.portkey.ai/v1
      description: Portkey API Public Endpoint
    - url: SELF_HOSTED_CONTROL_PLANE_URL
      description: Self-Hosted Control Plane URL
    post:
      tags:
      - User-invites
      summary: Resend Invite
      description: Resend an invite to user for your organization
      parameters:
      - name: inviteId
        in: path
        schema:
          type: string
        required: true
      responses:
        '200':
          description: OK
          headers:
            Content-Type:
              schema:
                type: string
                example: application/json
          content:
            application/json:
              schema:
                type: object
                properties:
                  inviteLink:
                    type: string
                    format: uri
              example:
                inviteLink: https://app.portkey.ai/invite/some-invite-link
      x-code-samples:
      - lang: python
        label: Default
        source: "from portkey_ai import Portkey\n\n# Initialize the Portkey client\nportkey = Portkey(\n    api_key=\"PORTKEY_API_KEY\",\n)\n\n\n\n# Delete a user invite\nuser = portkey.admin.users.invites.resend(\n    invite_id=\"INVITE_ID\"\n)\n\nprint(user)\n"
      - lang: javascript
        label: Default
        source: "import { Portkey } from \"portkey-ai\";\n\nconst portkey = new Portkey({\n    apiKey: \"PORTKEY_API_KEY\",\n})\n\nconst user=await portkey.admin.users.invites.resend({\n    inviteId:\"INVITE_ID\"\n});\n\nconsole.log(user);\n"
      - lang: curl
        label: Default
        source: "curl -X POST \"https://api.portkey.ai/v1/admin/users/invites/INVITE_ID/resend\"\n  -H \"x-portkey-api-key: PORTKEY_API_KEY\"\n"
      - lang: curl
        label: Self-Hosted
        source: "curl -X POST \"SELF_HOSTED_CONTROL_PLANE_URL/admin/users/invites/INVITE_ID/resend\"\n  -H \"x-portkey-api-key: PORTKEY_API_KEY\"\n"
      - lang: python
        label: Self-Hosted
        source: "from portkey_ai import Portkey\n\n# Initialize the Portkey client\nportkey = Portkey(\n    api_key=\"PORTKEY_API_KEY\",\n    base_url=\"SELF_HOSTED_CONTROL_PLANE_URL\"\n)\n\n# Delete a user invite\nuser = portkey.admin.users.invites.resend(\n    invite_id=\"INVITE_ID\"\n)\n\nprint(user)\n"
      - lang: javascript
        label: Self-Hosted
        source: "import { Portkey } from \"portkey-ai\";\n\nconst portkey = new Portkey({\n    apiKey: \"PORTKEY_API_KEY\",\n    baseUrl: \"SELF_HOSTED_CONTROL_PLANE_URL\"\n})\n\nconst user=await portkey.admin.users.invites.resend({\n    inviteId:\"INVITE_ID\"\n});\n\nconsole.log(user);\n"
components:
  schemas:
    SuccessInvite:
      type: object
      required:
      - id
      - invite_link
      properties:
        id:
          type: string
        invite_link:
          type: string
      example:
        id: a286286b-633d-4c4f-bddb-86b84a50a25c
        invite_link: https://app.portkey.ai/invite_id
    InviteRole:
      type: string
      enum:
      - admin
      - member
    CreateInvite:
      type: object
      required:
      - email
      - workspaces
      - role
      properties:
        email:
          type: string
        workspaces:
          type: array
          items:
            $ref: '#/components/schemas/WorkspaceInvite'
        role:
          $ref: '#/components/schemas/InviteRole'
        workspace_api_key_details:
          type: object
          properties:
            scopes:
              type: array
              items:
                type: string
          required:
          - scopes
      example:
        email: test@john.doe
        role: admin
        workspaces:
        - id: ws-slug
          role: member
    Invite:
      type: object
      properties:
        object:
          type: string
          example: invite
        id:
          type: string
          format: uuid
        email:
          type: string
          format: email
        role:
          type: string
          enum:
          - admin
          - member
        created_at:
          type: string
          format: date-time
        expires_at:
          type: string
          format: date-time
        accepted_at:
          type: string
          format: date-time
        status:
          type: string
          enum:
          - pending
          - cancelled
          - accepted
          - expired
        invited_by:
          type: string
          format: uuid
    WorkspaceInviteRole:
      type: string
      enum:
      - admin
      - member
      - manager
    WorkspaceInvite:
      type: object
      required:
      - id
      - role
      properties:
        id:
          type: string
          description: Workspace Slug
        role:
          $ref: '#/components/schemas/WorkspaceInviteRole'
    InviteList:
      type: object
      properties:
        object:
          type: string
          enum:
          - list
        total:
          type: integer
        data:
          type: array
          items:
            $ref: '#/components/schemas/Invite'
  securitySchemes:
    Portkey-Key:
      type: apiKey
      in: header
      name: x-portkey-api-key
    Virtual-Key:
      type: apiKey
      in: header
      name: x-portkey-virtual-key
    Provider-Auth:
      type: http
      scheme: bearer
    Provider-Name:
      type: apiKey
      in: header
      name: x-portkey-provider
    Config:
      type: apiKey
      in: header
      name: x-portkey-config
    Custom-Host:
      type: apiKey
      in: header
      name: x-portkey-custom-host
