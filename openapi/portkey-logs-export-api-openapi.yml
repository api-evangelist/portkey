        source: "from portkey_ai import Portkey\n\nportkey = Portkey(\n   api_key=\"PORTKEY_API_KEY\"\n)\n\nres = portkey.logs.exports.create(\n  filters={\n    'time_of_generation_min': \"2024-10-20\",\n    'time_of_generation_max': \"2024-10-30\"\n  },\n  workspace_id=\"WORKSPACE_ID\",\n  description=\"This is random description\",\n  requested_data=[\n    \"id\",\n    \"trace_id\",\n    \"created_at\",\n    \"request\",\n    \"response\",\n    \"is_success\",\n    \"ai_org\",\n    \"ai_model\",\n    \"req_units\",\n    \"res_units\",\n    \"total_units\",\n    \"request_url\",\n    \"cost\",\n    \"cost_currency\",\n    \"response_time\",\n    \"response_status_code\",\n    \"mode\",\n    \"config\",\n    \"prompt_slug\",\n    \"metadata\"\n  ]\n)\n\nprint(res)\n"
