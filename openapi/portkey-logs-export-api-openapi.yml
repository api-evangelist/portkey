openapi: 3.0.0
info:
  title: Portkey Analytics > Graphs Logs Export API
  description: The Portkey REST API. Please see https://portkey.ai/docs/api-reference for more details.
  version: 2.0.0
  termsOfService: https://portkey.ai/terms
  contact:
    name: Portkey Developer Forum
    url: https://portkey.wiki/community
  license:
    name: MIT
    url: https://github.com/Portkey-AI/portkey-openapi/blob/master/LICENSE
servers:
- url: https://api.portkey.ai/v1
  description: Portkey API Public Endpoint
security:
- Portkey-Key: []
tags:
- name: Logs Export
  description: Exports logs service.
paths:
  /logs/exports/{exportId}:
    servers:
    - url: https://api.portkey.ai/v1
      description: Portkey API Public Endpoint
    - url: SELF_HOSTED_CONTROL_PLANE_URL
      description: Self-Hosted Control Plane URL
    get:
      tags:
      - Logs Export
      summary: Get a specific logs export
      parameters:
      - name: exportId
        in: path
        required: true
        schema:
          type: string
      responses:
        '200':
          description: Successful response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ExportItem'
      x-code-samples:
      - lang: python
        label: Default
        source: "from portkey_ai import Portkey\n\nportkey = Portkey(\n  api_key=\"PORTKEY_API_KEY\"\n)\n\nres = portkey.logs.exports.retrieve(\n  export_id=\"EXPORT_ID\"\n)\n\nprint(res)\n"
      - lang: javascript
        label: Default
        source: "import Portkey from \"portkey-ai\";\n\nconst portkey = new Portkey({\n  apiKey:\"PORTKEY_API_KEY\"\n})\n\nasync function main() {\n  const res= await portkey.logs.exports.retrieve({\n    exportId:\"EXPORT_ID\"\n  });\n\n  console.log(res);\n}\n\nmain();\n"
      - lang: curl
        label: Default
        source: 'curl -X GET "https://api.portkey.ai/v1/logs/exports/EXPORT_ID" \

          -H "x-portkey-api-key: PORTKEY_API_KEY"

          '
      - lang: curl
        label: Self-Hosted
        source: 'curl -X GET "SELF_HOSTED_CONTROL_PLANE_URL/logs/exports/EXPORT_ID" \

          -H "x-portkey-api-key: PORTKEY_API_KEY"

          '
      - lang: python
        label: Self-Hosted
        source: "from portkey_ai import Portkey\n\nportkey = Portkey(\n  api_key=\"PORTKEY_API_KEY\",\n  base_url=\"SELF_HOSTED_CONTROL_PLANE_URL\"\n)\n\nres = portkey.logs.exports.retrieve(\n  export_id='EXPORT_ID'\n)\n\nprint(res)\n"
      - lang: javascript
        label: Self-Hosted
        source: "import Portkey from \"portkey-ai\";\n\nconst portkey = new Portkey({\n  apiKey:\"PORTKEY_API_KEY\",\n  baseUrl:\"SELF_HOSTED_CONTROL_PLANE_URL\"\n})\n\nasync function main() {\n  const res= await portkey.logs.exports.retrieve({\n    exportId:'EXPORT_ID'\n  });;\n\n  console.log(res);\n}\n\nmain()\n"
    put:
      tags:
      - Logs Export
      summary: Update a logs export
      parameters:
      - name: exportId
        in: path
        required: true
        schema:
          type: string
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                workspace_id:
                  type: string
                filters:
                  $ref: '#/components/schemas/GenerationsFilterSchema'
                requested_data:
                  $ref: '#/components/schemas/LogExportsRequestedData'
              required:
              - filters
      responses:
        '200':
          description: Successful response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UpdateExportResponse'
      x-code-samples:
      - lang: python
        label: Default
        source: "from portkey_ai import Portkey\n\nportkey = Portkey(\n  api_key=\"PORTKEY_API_KEY\"\n)\n\nres = portkey.logs.exports.update(\n  export_id=\"EXPORT_ID\",\n  workspace_id=\"WORKSPACE_ID\",\n  filters={\n    \"time_of_generation_max\": \"2024-07-25\"\n  }\n)\n\nprint(res)\n"
      - lang: javascript
        label: Default
        source: "import Portkey from \"portkey-ai\";\n\nconst portkey = new Portkey({\n  apiKey:\"PORTKEY_API_KEY\"\n})\n\nasync function main() {\n  const res = await portkey.logs.exports.update({\n    exportId:\"7ef9f738-a93a-xxx-xxx-xxxxx\",\n    workspaceId: \"ws-shared-xxx\",\n    filters: {\n      \"time_of_generation_max\": \"2024-07-25\"\n    }\n  });\n\n  console.log(res);\n}\n\nmain();\n"
      - lang: curl
        label: Default
        source: 'curl -X PUT "https://api.portkey.ai/v1/logs/exports/EXPORT_ID" \

          -H "x-portkey-api-key: PORTKEY_API_KEY" \

          -H "Content-Type: application/json" \

          -d ''{"workspace_id":"WORKSPACE_ID","filters":{"time_of_generation_max":"2024-07-25"}}''

          '
      - lang: curl
        label: Self-Hosted
        source: 'curl -X PUT "SELF_HOSTED_CONTROL_PLANE_URL/logs/exports/EXPORT_ID" \

          -H "x-portkey-api-key: PORTKEY_API_KEY" \

          -H "Content-Type: application/json" \

          -d ''{"workspace_id":"WORKSPACE_ID","filters":{"time_of_generation_max":"2024-07-25"}}''

          '
      - lang: python
        label: Self-Hosted
        source: "from portkey_ai import Portkey\n\nportkey = Portkey(\n  api_key=\"PORTKEY_API_KEY\",\n  base_url=\"SELF_HOSTED_CONTROL_PLANE_URL\"\n)\n\nres = portkey.logs.exports.update(\n  export_id='EXPORT_ID',\n  workspace_id='WORKSPACE_ID',\n  filters={\n    'time_of_generation_max': '2024-07-25'\n  }\n)\n\nprint(res)\n"
      - lang: javascript
        label: Self-Hosted
        source: "import Portkey from \"portkey-ai\";\n\nconst portkey = new Portkey({\n  apiKey:\"PORTKEY_API_KEY\",\n  baseUrl:\"SELF_HOSTED_CONTROL_PLANE_URL\"\n})\n\nasync function main() {\n  const res = await portkey.logs.exports.update({\n    exportId:\"7ef9f738-a93a-xxx-xxx-xxxxx\",\n    workspaceId: \"ws-shared-xxx\",\n    filters: {\n      \"time_of_generation_max\": \"2024-07-25\"\n    }\n  });\n\n  console.log(res);\n}\n\nmain();\n"
