openapi: 3.0.0
info:
  title: Portkey Analytics > Graphs Rate Limits Policies API
  description: The Portkey REST API. Please see https://portkey.ai/docs/api-reference for more details.
  version: 2.0.0
  termsOfService: https://portkey.ai/terms
  contact:
    name: Portkey Developer Forum
    url: https://portkey.wiki/community
  license:
    name: MIT
    url: https://github.com/Portkey-AI/portkey-openapi/blob/master/LICENSE
servers:
- url: https://api.portkey.ai/v1
  description: Portkey API Public Endpoint
security:
- Portkey-Key: []
tags:
- name: Rate Limits Policies
  description: Manage rate limits policies to control request or token rates
paths:
  /policies/rate-limits:
    post:
      tags:
      - Rate Limits Policies
      summary: Create Rate Limits Policy
      description: Create a new rate limits policy to control the rate of requests or tokens consumed per minute, hour, or day.
      operationId: createRateLimitsPolicy
      security:
      - Portkey-Key: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateRateLimitsPolicyRequest'
            examples:
              requestsPerMinute:
                summary: 100 Requests per Minute per API Key
                value:
                  name: 100 RPM per API Key
                  conditions:
                  - key: workspace_id
                    value: workspace-123
                  group_by:
                  - key: api_key
                  type: requests
                  unit: rpm
                  value: 100
              tokensPerHour:
                summary: 10K Tokens per Hour per User
                value:
                  name: 10K Tokens per Hour per User
                  conditions:
                  - key: workspace_id
                    value: workspace-123
                  group_by:
                  - key: metadata.user_id
                  type: tokens
                  unit: rph
                  value: 10000
      responses:
        '200':
          description: Policy created successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CreatePolicyResponse'
        '400':
          description: Bad request
        '401':
          description: Unauthorized
        '403':
          description: Forbidden
        '500':
          description: Server error
    get:
      tags:
      - Rate Limits Policies
      summary: List Rate Limits Policies
      description: List all rate limits policies with optional filtering.
      operationId: listRateLimitsPolicies
      security:
      - Portkey-Key: []
      parameters:
      - $ref: '#/components/parameters/WorkspaceIdQuery'
      - name: status
        in: query
        description: Filter by status
        required: false
        schema:
          type: string
          enum:
          - active
          - archived
          default: active
      - name: type
        in: query
        description: Filter by policy type
        required: false
        schema:
          type: string
          enum:
          - requests
          - tokens
      - name: unit
        in: query
        description: Filter by rate unit
        required: false
        schema:
          type: string
          enum:
          - rpm
          - rph
          - rpd
      - $ref: '#/components/parameters/PageSize'
      - $ref: '#/components/parameters/CurrentPage'
      responses:
        '200':
          description: List of rate limits policies
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RateLimitsPolicyListResponse'
        '400':
          description: Bad request
        '401':
          description: Unauthorized
        '403':
          description: Forbidden
        '404':
          description: Policy not found
        '500':
          description: Server error
  /policies/rate-limits/{rateLimitsPolicyId}:
    get:
      tags:
      - Rate Limits Policies
      summary: Get Rate Limits Policy
      description: Get a single rate limits policy by ID.
      operationId: getRateLimitsPolicy
      security:
      - Portkey-Key: []
      parameters:
      - $ref: '#/components/parameters/RateLimitsPolicyId'
      - name: status
        in: query
        description: Filter by status
        required: false
        schema:
          type: string
          enum:
          - active
          - archived
          default: active
      responses:
        '200':
          description: Rate limits policy details
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RateLimitsPolicyResponse'
        '400':
          description: Bad request
        '401':
          description: Unauthorized
        '403':
          description: Forbidden
        '404':
          description: Policy not found
        '500':
          description: Server error
    put:
      tags:
      - Rate Limits Policies
      summary: Update Rate Limits Policy
      description: Update an existing rate limits policy.
      operationId: updateRateLimitsPolicy
      security:
      - Portkey-Key: []
      parameters:
      - $ref: '#/components/parameters/RateLimitsPolicyId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateRateLimitsPolicyRequest'
            example:
              value: 200
              unit: rph
      responses:
        '200':
          description: OK
          headers:
            Content-Type:
              schema:
                type: string
                example: application/json
          content:
            application/json:
              schema:
                type: object
              example: {}
        '400':
          description: Bad request
        '401':
          description: Unauthorized
        '403':
          description: Forbidden
        '404':
          description: Policy not found
        '500':
          description: Server error
    delete:
      tags:
      - Rate Limits Policies
      summary: Delete Rate Limits Policy
      description: Delete a rate limits policy.
      operationId: deleteRateLimitsPolicy
      security:
      - Portkey-Key: []
      parameters:
      - $ref: '#/components/parameters/RateLimitsPolicyId'
      responses:
        '200':
          description: OK
          headers:
            Content-Type:
              schema:
                type: string
                example: application/json
          content:
            application/json:
              schema:
                type: object
              example: {}
        '400':
          description: Bad request
        '401':
          description: Unauthorized
        '403':
          description: Forbidden
        '404':
          description: Policy not found
        '500':
          description: Server error
components:
  schemas:
    RateLimitsPolicyListResponse:
      type: object
      properties:
        object:
          type: string
          example: list
        data:
          type: array
          items:
            $ref: '#/components/schemas/RateLimitsPolicy'
        total:
          type: integer
          description: Total number of policies
    CreateRateLimitsPolicyRequest:
      type: object
      required:
      - conditions
      - group_by
      - type
      - unit
      - value
      properties:
        name:
          type: string
          maxLength: 255
          description: Policy name
          example: 100 Requests per Minute
        conditions:
          type: array
          minItems: 1
          items:
            $ref: '#/components/schemas/Condition'
          description: Array of conditions that define which requests the policy applies to
        group_by:
          type: array
          minItems: 1
          items:
            $ref: '#/components/schemas/GroupBy'
          description: Array of group by fields that define how usage is aggregated
        type:
          type: string
          enum:
          - requests
          - tokens
          description: Policy type
        unit:
          type: string
          enum:
          - rpm
          - rph
          - rpd
          description: 'Rate unit:

            - `rpm` - Requests/Tokens per minute

            - `rph` - Requests/Tokens per hour

            - `rpd` - Requests/Tokens per day

            '
        value:
          type: number
          description: Rate limit value
        workspace_id:
          type: string
          description: Workspace ID or slug. Required if not using API key authentication.
        organisation_id:
          type: string
          format: uuid
          description: Organization ID. Required if not using API key authentication.
    RateLimitsPolicyResponse:
      allOf:
      - $ref: '#/components/schemas/RateLimitsPolicy'
      - type: object
        properties:
          object:
            type: string
            example: policy_rate_limits
    GroupBy:
      type: object
      required:
      - key
      properties:
        key:
          type: string
          description: 'Group by key. Valid values:

            - `api_key` - Group by API key

            - `organisation_id` - Group by organization

            - `workspace_id` - Group by workspace

            - `metadata.*` - Group by custom metadata fields

            '
          example: api_key
    CreatePolicyResponse:
      type: object
      properties:
        id:
          type: string
          format: uuid
          description: Created policy UUID
        object:
          type: string
          description: Resource type
          example: policy_usage_limits
    Condition:
      type: object
      required:
      - key
      - value
      properties:
        key:
          type: string
          description: 'Condition key. Valid values:

            - `api_key` - Apply to a specific API key

            - `organisation_id` - Apply to an organization

            - `workspace_id` - Apply to a workspace

            - `metadata.*` - Apply based on custom metadata fields (e.g., `metadata.user_id`, `metadata.team`)

            '
          example: workspace_id
        value:
          type: string
          description: Condition value
          example: workspace-123
    RateLimitsPolicy:
      type: object
      required:
      - id
      - type
      - unit
      - value
      - status
      - workspace_id
      - organisation_id
      - created_at
      - last_updated_at
      properties:
        id:
          type: string
          format: uuid
          description: Policy UUID
        name:
          type: string
          nullable: true
          description: Policy name
        conditions:
          type: array
          items:
            $ref: '#/components/schemas/Condition'
          description: Array of conditions
        group_by:
          type: array
          items:
            $ref: '#/components/schemas/GroupBy'
          description: Array of group by fields
        type:
          type: string
          enum:
          - requests
          - tokens
          description: Policy type
        unit:
          type: string
          enum:
          - rpm
          - rph
          - rpd
          description: Rate unit
        value:
          type: number
          description: Rate limit value
        status:
          type: string
          enum:
          - active
          - archived
          description: Policy status
        workspace_id:
          type: string
          format: uuid
          description: Workspace UUID
        organisation_id:
          type: string
          format: uuid
          description: Organization UUID
        created_at:
          type: string
          format: date-time
          description: Creation timestamp
        last_updated_at:
          type: string
          format: date-time
          description: Last update timestamp
    UpdateRateLimitsPolicyRequest:
      type: object
      properties:
        name:
          type: string
          maxLength: 255
          description: Policy name
        unit:
          type: string
          enum:
          - rpm
          - rph
          - rpd
          description: Rate unit
        value:
          type: number
          description: Rate limit value
  parameters:
    WorkspaceIdQuery:
      name: workspace_id
      in: query
      required: false
      description: Workspace ID or slug
      schema:
        type: string
    CurrentPage:
      in: query
      name: current_page
      schema:
        type: integer
        minimum: 0
      description: Current page number
    RateLimitsPolicyId:
      name: rateLimitsPolicyId
      in: path
      required: true
      description: Rate limits policy UUID
      schema:
        type: string
        format: uuid
    PageSize:
      in: query
      name: page_size
      schema:
        type: integer
        minimum: 0
      description: Number of items per page
  securitySchemes:
    Portkey-Key:
      type: apiKey
      in: header
      name: x-portkey-api-key
    Virtual-Key:
      type: apiKey
      in: header
      name: x-portkey-virtual-key
    Provider-Auth:
      type: http
      scheme: bearer
    Provider-Name:
      type: apiKey
      in: header
      name: x-portkey-provider
    Config:
      type: apiKey
      in: header
      name: x-portkey-config
    Custom-Host:
      type: apiKey
      in: header
      name: x-portkey-custom-host
