specification: FinOps Framework
specificationVersion: '1.0'
schema: https://www.finops.org/framework/
provider: Portkey
providerId: portkey
created: '2026-05-04'
modified: '2026-05-05'
reconciled: true
tags:
  - AI Gateways
  - Governance
  - Observability
  - FinOps
  - FOCUS
description: >-
  FOCUS-aligned FinOps for Portkey: flat subscription on the Production tier
  ($49/month + $9 per additional 100k requests above the 100k included logs)
  plus contact-sales Enterprise. The primary billable meter is recorded request
  logs; secondary dimensions track virtual keys, workspaces, and the upstream
  LLM provider being proxied so that AI spend can be allocated by team and
  model.
sources:
  - https://portkey.ai/pricing
  - https://portkey.ai/docs/product/enterprise-offering/private-cloud-deployments
alignedWith:
  framework: FinOps Foundation Framework
  frameworkUrl: https://www.finops.org/framework/
  dataSpec: FOCUS
  dataSpecVersion: '1.3'
  dataSpecUrl: https://focus.finops.org/focus-specification/v1-3/
publisherName: Portkey AI, Inc.
serviceCategory: AI Infrastructure
billingModel:
  pricingCategory: Subscription + Usage Overage
  billingFrequency: Monthly
  billingCurrency: USD
  chargeCategories:
    - Purchase
    - Usage
    - Tax
    - Adjustment
focusColumns:
  ServiceName: Portkey
  ServiceCategory: AI Infrastructure
  ServiceSubcategory: AI Gateway
  ProviderName: Portkey
  PublisherName: Portkey AI, Inc.
  InvoiceIssuerName: Portkey AI, Inc.
  BillingCurrency: USD
  ChargeCategory: Usage
  PricingUnit: 100k requests
meters:
  - name: recorded_logs
    description: Request log entries persisted by the Portkey gateway and counted toward the plan cap.
    unit: log
    aggregation: sum
    dimensions:
      - virtual_key
      - workspace
      - upstream_provider
      - model
      - environment
  - name: log_overage
    description: Recorded logs above the 100k Production-plan included quota, billed in 100k-request blocks.
    unit: 100k-requests
    aggregation: sum
    dimensions:
      - workspace
      - environment
  - name: subscription
    description: Flat monthly Production subscription seat.
    unit: month
    aggregation: count
    dimensions:
      - plan
  - name: prompt_templates
    description: Stored prompt templates (capped on Developer at 3, unlimited on Production+).
    unit: template
    aggregation: max
    dimensions:
      - workspace
  - name: log_retention_days
    description: Configured retention horizon (3 days on Developer, 30 on Production, custom on Enterprise).
    unit: day
    aggregation: max
    dimensions:
      - workspace
principles:
  - name: Visibility
    description: Use the Portkey Logs, Traces, Metadata, and Filters surface (and the Admin API analytics endpoints) to attribute every proxied LLM call to a virtual key, workspace, and upstream model.
  - name: Allocation
    description: Tag virtual keys with team, environment, and product so the recorded-logs meter can be allocated; budgets and rate limits on Enterprise can be scoped per virtual key for chargeback.
  - name: Optimization
    description: Use Portkey's semantic caching, fallbacks, and routing to lower upstream LLM token spend; right-size the Production overage band ($9 per 100k requests) before promoting to Enterprise contracts.
  - name: Accountability
    description: Assign budget owners to each workspace; configure alerts on the granular budget and rate-limit primitives so overruns surface to the responsible team.
maintainers:
