      with:
        userId: tools.userId
      outputParameters:
      - type: object
        mapping: $.
    - name: remove-user
      description: Remove a user
      hints:
        readOnly: false
        destructive: true
        idempotent: true
      call: portkey-users.delete
      with:
        userId: tools.userId
      outputParameters:
      - type: object
        mapping: $.
    - name: update-user
      description: Update user
      hints:
        readOnly: false
        destructive: false
        idempotent: true
      call: portkey-users.put
      with:
        userId: tools.userId
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
