naftiko: 1.0.0-alpha2
info:
  label: Portkey API — Logs Export
  description: 'Portkey API — Logs Export. 7 operations. Lead operation: Get all logs exports. Self-contained Naftiko capability
    covering one Portkey business surface.'
  tags:
  - Portkey
  - Logs Export
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    PORTKEY_API_KEY: PORTKEY_API_KEY
capability:
  consumes:
  - type: http
    namespace: portkey-logs-export
    baseUri: https://api.portkey.ai/v1
    description: Portkey API — Logs Export business capability. Self-contained, no shared references.
    resources:
    - name: logs-exports
      path: /logs/exports
      operations:
      - name: get
        method: GET
        description: Get all logs exports
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: workspace_id
          in: query
          type: string
      - name: post
        method: POST
        description: Create log export
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: false
    - name: logs-exports-exportId
      path: /logs/exports/{exportId}
      operations:
      - name: get
        method: GET
        description: Get a specific logs export
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: exportId
          in: path
          type: string
          required: true
      - name: put
        method: PUT
        description: Update a logs export
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: exportId
          in: path
          type: string
          required: true
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: false
    - name: logs-exports-exportId-cancel
      path: /logs/exports/{exportId}/cancel
      operations:
      - name: post
        method: POST
        description: Cancel log export
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: exportId
          in: path
          type: string
          required: true
    - name: logs-exports-exportId-download
      path: /logs/exports/{exportId}/download
      operations:
      - name: get
        method: GET
        description: Download log export
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: exportId
          in: path
          type: string
          required: true
    - name: logs-exports-exportId-start
      path: /logs/exports/{exportId}/start
      operations:
      - name: post
        method: POST
        description: Start log export
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: exportId
          in: path
          type: string
          required: true
    authentication:
      type: bearer
      token: '{{env.PORTKEY_API_KEY}}'
  exposes:
  - type: rest
    namespace: portkey-logs-export-rest
    port: 8080
    description: REST adapter for Portkey API — Logs Export. One Spectral-compliant resource per consumed operation, prefixed
      with /v1.
    resources:
    - path: /v1/logs/exports
      name: logs-exports
      description: REST surface for logs-exports.
      operations:
      - method: GET
        name: get
        description: Get all logs exports
        call: portkey-logs-export.get
        with:
          workspace_id: rest.workspace_id
        outputParameters:
        - type: object
          mapping: $.
      - method: POST
        name: post
        description: Create log export
        call: portkey-logs-export.post
        with:
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/logs/exports/{exportid}
      name: logs-exports-exportid
      description: REST surface for logs-exports-exportId.
      operations:
      - method: GET
        name: get
        description: Get a specific logs export
        call: portkey-logs-export.get
        with:
          exportId: rest.exportId
        outputParameters:
        - type: object
          mapping: $.
      - method: PUT
        name: put
        description: Update a logs export
        call: portkey-logs-export.put
        with:
          exportId: rest.exportId
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/logs/exports/{exportid}/cancel
      name: logs-exports-exportid-cancel
      description: REST surface for logs-exports-exportId-cancel.
      operations:
      - method: POST
        name: post
        description: Cancel log export
        call: portkey-logs-export.post
        with:
          exportId: rest.exportId
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/logs/exports/{exportid}/download
      name: logs-exports-exportid-download
      description: REST surface for logs-exports-exportId-download.
      operations:
      - method: GET
        name: get
        description: Download log export
        call: portkey-logs-export.get
        with:
          exportId: rest.exportId
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/logs/exports/{exportid}/start
      name: logs-exports-exportid-start
      description: REST surface for logs-exports-exportId-start.
      operations:
      - method: POST
        name: post
        description: Start log export
        call: portkey-logs-export.post
        with:
          exportId: rest.exportId
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: portkey-logs-export-mcp
    port: 9090
    transport: http
    description: MCP adapter for Portkey API — Logs Export. One tool per consumed operation, routed inline through this capability's
      consumes block.
    tools:
    - name: get-all-logs-exports
      description: Get all logs exports
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: portkey-logs-export.get
      with:
        workspace_id: tools.workspace_id
      outputParameters:
      - type: object
        mapping: $.
    - name: create-log-export
      description: Create log export
      hints:
        readOnly: false
        destructive: false
        idempotent: false
      call: portkey-logs-export.post
      with:
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
    - name: get-specific-logs-export
      description: Get a specific logs export
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: portkey-logs-export.get
      with:
        exportId: tools.exportId
      outputParameters:
      - type: object
        mapping: $.
    - name: update-logs-export
      description: Update a logs export
      hints:
        readOnly: false
        destructive: false
        idempotent: true
      call: portkey-logs-export.put
      with:
        exportId: tools.exportId
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
    - name: cancel-log-export
      description: Cancel log export
      hints:
        readOnly: false
        destructive: false
        idempotent: false
      call: portkey-logs-export.post
      with:
        exportId: tools.exportId
      outputParameters:
      - type: object
        mapping: $.
    - name: download-log-export
      description: Download log export
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: portkey-logs-export.get
      with:
        exportId: tools.exportId
      outputParameters:
      - type: object
        mapping: $.
    - name: start-log-export
      description: Start log export
      hints:
        readOnly: false
        destructive: false
        idempotent: false
      call: portkey-logs-export.post
      with:
        exportId: tools.exportId
      outputParameters:
      - type: object
        mapping: $.
