naftiko: 1.0.0-alpha2
info:
  label: Portkey API — Logs
  description: 'Portkey API — Logs. 2 operations. Lead operation: Insert New logs. Self-contained Naftiko capability covering
    one Portkey business surface.'
  tags:
  - Portkey
  - Logs
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    PORTKEY_API_KEY: PORTKEY_API_KEY
capability:
  consumes:
  - type: http
    namespace: portkey-logs
    baseUri: https://api.portkey.ai/v1
    description: Portkey API — Logs business capability. Self-contained, no shared references.
    resources:
    - name: logs
      path: /logs
      operations:
      - name: post
        method: POST
        description: Insert New logs
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
    - name: logs-logId
      path: /logs/{logId}
      operations:
      - name: get
        method: GET
        description: Get a specific log
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: logId
          in: path
          type: string
          required: true
    authentication:
      type: bearer
      token: '{{env.PORTKEY_API_KEY}}'
  exposes:
  - type: rest
    namespace: portkey-logs-rest
    port: 8080
    description: REST adapter for Portkey API — Logs. One Spectral-compliant resource per consumed operation, prefixed with
      /v1.
    resources:
    - path: /v1/logs
      name: logs
      description: REST surface for logs.
      operations:
      - method: POST
        name: post
        description: Insert New logs
        call: portkey-logs.post
        with:
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/logs/{logid}
      name: logs-logid
      description: REST surface for logs-logId.
      operations:
      - method: GET
        name: get
        description: Get a specific log
        call: portkey-logs.get
        with:
          logId: rest.logId
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: portkey-logs-mcp
    port: 9090
    transport: http
    description: MCP adapter for Portkey API — Logs. One tool per consumed operation, routed inline through this capability's
      consumes block.
    tools:
    - name: insert-new-logs
      description: Insert New logs
      hints:
        readOnly: false
        destructive: false
        idempotent: false
      call: portkey-logs.post
      with:
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
    - name: get-specific-log
      description: Get a specific log
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: portkey-logs.get
      with:
        logId: tools.logId
      outputParameters:
      - type: object
        mapping: $.
