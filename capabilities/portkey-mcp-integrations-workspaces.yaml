naftiko: 1.0.0-alpha2
info:
  label: Portkey API — MCP Integrations > Workspaces
  description: 'Portkey API — MCP Integrations > Workspaces. 2 operations. Lead operation: List MCP Integration Workspaces.
    Self-contained Naftiko capability covering one Portkey business surface.'
  tags:
  - Portkey
  - MCP Integrations > Workspaces
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    PORTKEY_API_KEY: PORTKEY_API_KEY
capability:
  consumes:
  - type: http
    namespace: portkey-mcp-integrations-workspaces
    baseUri: https://api.portkey.ai/v1
    description: Portkey API — MCP Integrations > Workspaces business capability. Self-contained, no shared references.
    resources:
    - name: mcp-integrations-mcpIntegrationId-workspaces
      path: /mcp-integrations/{mcpIntegrationId}/workspaces
      operations:
      - name: mcpintegrationworkspaceslist
        method: GET
        description: List MCP Integration Workspaces
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: version
          in: query
          type: string
          description: When set, response uses data/total shape instead of workspaces
      - name: mcpintegrationworkspacesbulkupdate
        method: PUT
        description: Bulk Update MCP Integration Workspaces
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
    authentication:
      type: bearer
      token: '{{env.PORTKEY_API_KEY}}'
  exposes:
  - type: rest
    namespace: portkey-mcp-integrations-workspaces-rest
    port: 8080
    description: REST adapter for Portkey API — MCP Integrations > Workspaces. One Spectral-compliant resource per consumed
      operation, prefixed with /v1.
    resources:
    - path: /v1/mcp-integrations/{mcpintegrationid}/workspaces
      name: mcp-integrations-mcpintegrationid-workspaces
      description: REST surface for mcp-integrations-mcpIntegrationId-workspaces.
      operations:
      - method: GET
        name: mcpintegrationworkspaceslist
        description: List MCP Integration Workspaces
        call: portkey-mcp-integrations-workspaces.mcpintegrationworkspaceslist
        with:
          version: rest.version
        outputParameters:
        - type: object
          mapping: $.
      - method: PUT
        name: mcpintegrationworkspacesbulkupdate
        description: Bulk Update MCP Integration Workspaces
        call: portkey-mcp-integrations-workspaces.mcpintegrationworkspacesbulkupdate
        with:
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: portkey-mcp-integrations-workspaces-mcp
    port: 9090
    transport: http
    description: MCP adapter for Portkey API — MCP Integrations > Workspaces. One tool per consumed operation, routed inline
      through this capability's consumes block.
    tools:
    - name: list-mcp-integration-workspaces
      description: List MCP Integration Workspaces
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: portkey-mcp-integrations-workspaces.mcpintegrationworkspaceslist
      with:
        version: tools.version
      outputParameters:
      - type: object
        mapping: $.
    - name: bulk-update-mcp-integration-workspaces
      description: Bulk Update MCP Integration Workspaces
      hints:
        readOnly: false
        destructive: false
        idempotent: true
      call: portkey-mcp-integrations-workspaces.mcpintegrationworkspacesbulkupdate
      with:
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
