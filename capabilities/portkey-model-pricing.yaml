naftiko: 1.0.0-alpha2
info:
  label: Portkey API — Model Pricing
  description: 'Portkey API — Model Pricing. 1 operations. Lead operation: Get Model Pricing. Self-contained Naftiko capability
    covering one Portkey business surface.'
  tags:
  - Portkey
  - Model Pricing
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    PORTKEY_API_KEY: PORTKEY_API_KEY
capability:
  consumes:
  - type: http
    namespace: portkey-model-pricing
    baseUri: https://api.portkey.ai/v1
    description: Portkey API — Model Pricing business capability. Self-contained, no shared references.
    resources:
    - name: model-configs-pricing-provider-model
      path: /model-configs/pricing/{provider}/{model}
      operations:
      - name: getmodelpricing
        method: GET
        description: Get Model Pricing
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: provider
          in: path
          type: string
          description: Provider identifier. Use lowercase with hyphens.
          required: true
        - name: model
          in: path
          type: string
          description: Model identifier. Use the exact model name as specified by the provider.
          required: true
    authentication:
      type: bearer
      token: '{{env.PORTKEY_API_KEY}}'
  exposes:
  - type: rest
    namespace: portkey-model-pricing-rest
    port: 8080
    description: REST adapter for Portkey API — Model Pricing. One Spectral-compliant resource per consumed operation, prefixed
      with /v1.
    resources:
    - path: /v1/model-configs/pricing/{provider}/{model}
      name: model-configs-pricing-provider-model
      description: REST surface for model-configs-pricing-provider-model.
      operations:
      - method: GET
        name: getmodelpricing
        description: Get Model Pricing
        call: portkey-model-pricing.getmodelpricing
        with:
          provider: rest.provider
          model: rest.model
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: portkey-model-pricing-mcp
    port: 9090
    transport: http
    description: MCP adapter for Portkey API — Model Pricing. One tool per consumed operation, routed inline through this
      capability's consumes block.
    tools:
    - name: get-model-pricing
      description: Get Model Pricing
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: portkey-model-pricing.getmodelpricing
      with:
        provider: tools.provider
        model: tools.model
      outputParameters:
      - type: object
        mapping: $.
