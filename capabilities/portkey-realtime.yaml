naftiko: 1.0.0-alpha2
info:
  label: Portkey API — Realtime
  description: 'Portkey API — Realtime. 1 operations. Lead operation: Realtime. Self-contained Naftiko capability covering
    one Portkey business surface.'
  tags:
  - Portkey
  - Realtime
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    PORTKEY_API_KEY: PORTKEY_API_KEY
capability:
  consumes:
  - type: http
    namespace: portkey-realtime
    baseUri: https://api.portkey.ai/v1
    description: Portkey API — Realtime business capability. Self-contained, no shared references.
    resources:
    - name: realtime
      path: /realtime
      operations:
      - name: connectrealtime
        method: GET
        description: Realtime
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: model
          in: query
          type: string
          description: Often required for OpenAI-style realtime; other query params pass through unchanged.
    authentication:
      type: bearer
      token: '{{env.PORTKEY_API_KEY}}'
  exposes:
  - type: rest
    namespace: portkey-realtime-rest
    port: 8080
    description: REST adapter for Portkey API — Realtime. One Spectral-compliant resource per consumed operation, prefixed
      with /v1.
    resources:
    - path: /v1/realtime
      name: realtime
      description: REST surface for realtime.
      operations:
      - method: GET
        name: connectrealtime
        description: Realtime
        call: portkey-realtime.connectrealtime
        with:
          model: rest.model
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: portkey-realtime-mcp
    port: 9090
    transport: http
    description: MCP adapter for Portkey API — Realtime. One tool per consumed operation, routed inline through this capability's
      consumes block.
    tools:
    - name: realtime
      description: Realtime
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: portkey-realtime.connectrealtime
      with:
        model: tools.model
      outputParameters:
      - type: object
        mapping: $.
