naftiko: 1.0.0-alpha2
info:
  label: Portkey API — Audio
  description: 'Portkey API — Audio. 3 operations. Lead operation: Create Speech. Self-contained Naftiko capability covering
    one Portkey business surface.'
  tags:
  - Portkey
  - Audio
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    PORTKEY_API_KEY: PORTKEY_API_KEY
capability:
  consumes:
  - type: http
    namespace: portkey-audio
    baseUri: https://api.portkey.ai/v1
    description: Portkey API — Audio business capability. Self-contained, no shared references.
    resources:
    - name: audio-speech
      path: /audio/speech
      operations:
      - name: createspeech
        method: POST
        description: Create Speech
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
    - name: audio-transcriptions
      path: /audio/transcriptions
      operations:
      - name: createtranscription
        method: POST
        description: Create Transcription
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
    - name: audio-translations
      path: /audio/translations
      operations:
      - name: createtranslation
        method: POST
        description: Create Translation
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
    authentication:
      type: bearer
      token: '{{env.PORTKEY_API_KEY}}'
  exposes:
  - type: rest
    namespace: portkey-audio-rest
    port: 8080
    description: REST adapter for Portkey API — Audio. One Spectral-compliant resource per consumed operation, prefixed with
      /v1.
    resources:
    - path: /v1/audio/speech
      name: audio-speech
      description: REST surface for audio-speech.
      operations:
      - method: POST
        name: createspeech
        description: Create Speech
        call: portkey-audio.createspeech
        with:
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/audio/transcriptions
      name: audio-transcriptions
      description: REST surface for audio-transcriptions.
      operations:
      - method: POST
        name: createtranscription
        description: Create Transcription
        call: portkey-audio.createtranscription
        with:
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/audio/translations
      name: audio-translations
      description: REST surface for audio-translations.
      operations:
      - method: POST
        name: createtranslation
        description: Create Translation
        call: portkey-audio.createtranslation
        with:
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: portkey-audio-mcp
    port: 9090
    transport: http
    description: MCP adapter for Portkey API — Audio. One tool per consumed operation, routed inline through this capability's
      consumes block.
    tools:
    - name: create-speech
      description: Create Speech
      hints:
        readOnly: false
        destructive: false
        idempotent: false
      call: portkey-audio.createspeech
      with:
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
    - name: create-transcription
      description: Create Transcription
      hints:
        readOnly: false
        destructive: false
        idempotent: false
      call: portkey-audio.createtranscription
      with:
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
    - name: create-translation
      description: Create Translation
      hints:
        readOnly: false
        destructive: false
        idempotent: false
      call: portkey-audio.createtranslation
      with:
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
