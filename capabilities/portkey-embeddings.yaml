naftiko: 1.0.0-alpha2
info:
  label: Portkey API — Embeddings
  description: 'Portkey API — Embeddings. 1 operations. Lead operation: Embeddings. Self-contained Naftiko capability covering
    one Portkey business surface.'
  tags:
  - Portkey
  - Embeddings
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    PORTKEY_API_KEY: PORTKEY_API_KEY
capability:
  consumes:
  - type: http
    namespace: portkey-embeddings
    baseUri: https://api.portkey.ai/v1
    description: Portkey API — Embeddings business capability. Self-contained, no shared references.
    resources:
    - name: embeddings
      path: /embeddings
      operations:
      - name: createembedding
        method: POST
        description: Embeddings
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
    authentication:
      type: bearer
      token: '{{env.PORTKEY_API_KEY}}'
  exposes:
  - type: rest
    namespace: portkey-embeddings-rest
    port: 8080
    description: REST adapter for Portkey API — Embeddings. One Spectral-compliant resource per consumed operation, prefixed
      with /v1.
    resources:
    - path: /v1/embeddings
      name: embeddings
      description: REST surface for embeddings.
      operations:
      - method: POST
        name: createembedding
        description: Embeddings
        call: portkey-embeddings.createembedding
        with:
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: portkey-embeddings-mcp
    port: 9090
    transport: http
    description: MCP adapter for Portkey API — Embeddings. One tool per consumed operation, routed inline through this capability's
      consumes block.
    tools:
    - name: embeddings
      description: Embeddings
      hints:
        readOnly: false
        destructive: false
        idempotent: false
      call: portkey-embeddings.createembedding
      with:
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
