naftiko: 1.0.0-alpha2
info:
  label: Portkey API — Integrations
  description: 'Portkey API — Integrations. 5 operations. Lead operation: List All Integrations. Self-contained Naftiko capability
    covering one Portkey business surface.'
  tags:
  - Portkey
  - Integrations
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    PORTKEY_API_KEY: PORTKEY_API_KEY
capability:
  consumes:
  - type: http
    namespace: portkey-integrations
    baseUri: https://api.portkey.ai/v1
    description: Portkey API — Integrations business capability. Self-contained, no shared references.
    resources:
    - name: integrations
      path: /integrations
      operations:
      - name: get
        method: GET
        description: List All Integrations
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: current_page
          in: query
          type: integer
          description: Current page, defaults to 0
        - name: page_size
          in: query
          type: integer
          description: Page size, default to 100
        - name: workspace_id
          in: query
          type: string
          description: Filter integrations accessible by a specific workspace. When using workspace API keys, this value will
            be enforced based on the API key details
        - name: type
          in: query
          type: string
          description: For type=workspace, the API will only return Workpace-Scoped integrations. For type=organisation, the
            API will only return Global (organisation level) integrati
      - name: post
        method: POST
        description: Create a Integration
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
    - name: integrations-slug
      path: /integrations/{slug}
      operations:
      - name: get
        method: GET
        description: Get a Integration
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: slug
          in: path
          type: string
          required: true
      - name: put
        method: PUT
        description: Update a Integration
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: slug
          in: path
          type: string
          required: true
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
      - name: delete
        method: DELETE
        description: Delete a Integration
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: slug
          in: path
          type: string
          required: true
    authentication:
      type: bearer
      token: '{{env.PORTKEY_API_KEY}}'
  exposes:
  - type: rest
    namespace: portkey-integrations-rest
    port: 8080
    description: REST adapter for Portkey API — Integrations. One Spectral-compliant resource per consumed operation, prefixed
      with /v1.
    resources:
    - path: /v1/integrations
      name: integrations
      description: REST surface for integrations.
      operations:
      - method: GET
        name: get
        description: List All Integrations
        call: portkey-integrations.get
        with:
          current_page: rest.current_page
          page_size: rest.page_size
          workspace_id: rest.workspace_id
          type: rest.type
        outputParameters:
        - type: object
          mapping: $.
      - method: POST
        name: post
        description: Create a Integration
        call: portkey-integrations.post
        with:
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/integrations/{slug}
      name: integrations-slug
      description: REST surface for integrations-slug.
      operations:
      - method: GET
        name: get
        description: Get a Integration
        call: portkey-integrations.get
        with:
          slug: rest.slug
        outputParameters:
        - type: object
          mapping: $.
      - method: PUT
        name: put
        description: Update a Integration
        call: portkey-integrations.put
        with:
          slug: rest.slug
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
      - method: DELETE
        name: delete
        description: Delete a Integration
        call: portkey-integrations.delete
        with:
          slug: rest.slug
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: portkey-integrations-mcp
    port: 9090
    transport: http
    description: MCP adapter for Portkey API — Integrations. One tool per consumed operation, routed inline through this capability's
      consumes block.
    tools:
    - name: list-all-integrations
      description: List All Integrations
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: portkey-integrations.get
      with:
        current_page: tools.current_page
        page_size: tools.page_size
        workspace_id: tools.workspace_id
        type: tools.type
      outputParameters:
      - type: object
        mapping: $.
    - name: create-integration
      description: Create a Integration
      hints:
        readOnly: false
        destructive: false
        idempotent: false
      call: portkey-integrations.post
      with:
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
    - name: get-integration
      description: Get a Integration
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: portkey-integrations.get
      with:
        slug: tools.slug
      outputParameters:
      - type: object
        mapping: $.
    - name: update-integration
      description: Update a Integration
      hints:
        readOnly: false
        destructive: false
        idempotent: true
      call: portkey-integrations.put
      with:
        slug: tools.slug
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
    - name: delete-integration
      description: Delete a Integration
      hints:
        readOnly: false
        destructive: true
        idempotent: true
      call: portkey-integrations.delete
      with:
        slug: tools.slug
      outputParameters:
      - type: object
        mapping: $.
