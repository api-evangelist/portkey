        description: Update MCP Server
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: false
      - name: mcpserversdelete
        method: DELETE
        description: Delete MCP Server
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: mcp-servers-mcpServerId-test
      path: /mcp-servers/{mcpServerId}/test
