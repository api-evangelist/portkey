        method: POST
        description: Create MCP Server
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
      - name: mcpserverslist
        method: GET
        description: List MCP Servers
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: workspace_id
          in: query
          type: string
          description: Workspace ID or slug. Required when using org admin API key; optional when API key is workspace-scoped.
        - name: current_page
          in: query
          type: integer
        - name: page_size
          in: query
          type: integer
        - name: id
          in: query
          type: string
          description: Filter by MCP Server ID(s), comma-separated
