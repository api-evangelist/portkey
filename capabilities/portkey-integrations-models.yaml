naftiko: 1.0.0-alpha2
info:
  label: Portkey API — Integrations > Models
  description: 'Portkey API — Integrations > Models. 3 operations. Lead operation: List integration models. Self-contained
    Naftiko capability covering one Portkey business surface.'
  tags:
  - Portkey
  - Integrations > Models
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    PORTKEY_API_KEY: PORTKEY_API_KEY
capability:
  consumes:
  - type: http
    namespace: portkey-integrations-models
    baseUri: https://api.portkey.ai/v1
    description: Portkey API — Integrations > Models business capability. Self-contained, no shared references.
    resources:
    - name: integrations-slug-models
      path: /integrations/{slug}/models
      operations:
      - name: get
        method: GET
        description: List integration models
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: slug
          in: path
          type: string
          required: true
      - name: put
        method: PUT
        description: Bulk update integration models
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: slug
          in: path
          type: string
          required: true
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
      - name: delete
        method: DELETE
        description: Bulk delete integration custom models
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: slug
          in: path
          type: string
          required: true
        - name: slugs
          in: query
          type: string
          description: Comma-separated list of model slugs to delete
          required: true
    authentication:
      type: bearer
      token: '{{env.PORTKEY_API_KEY}}'
  exposes:
  - type: rest
    namespace: portkey-integrations-models-rest
    port: 8080
    description: REST adapter for Portkey API — Integrations > Models. One Spectral-compliant resource per consumed operation,
      prefixed with /v1.
    resources:
    - path: /v1/integrations/{slug}/models
      name: integrations-slug-models
      description: REST surface for integrations-slug-models.
      operations:
      - method: GET
        name: get
        description: List integration models
        call: portkey-integrations-models.get
        with:
          slug: rest.slug
        outputParameters:
        - type: object
          mapping: $.
      - method: PUT
        name: put
        description: Bulk update integration models
        call: portkey-integrations-models.put
        with:
          slug: rest.slug
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
      - method: DELETE
        name: delete
        description: Bulk delete integration custom models
        call: portkey-integrations-models.delete
        with:
          slug: rest.slug
          slugs: rest.slugs
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: portkey-integrations-models-mcp
    port: 9090
    transport: http
    description: MCP adapter for Portkey API — Integrations > Models. One tool per consumed operation, routed inline through
      this capability's consumes block.
    tools:
    - name: list-integration-models
      description: List integration models
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: portkey-integrations-models.get
      with:
        slug: tools.slug
      outputParameters:
      - type: object
        mapping: $.
    - name: bulk-update-integration-models
      description: Bulk update integration models
      hints:
        readOnly: false
        destructive: false
        idempotent: true
      call: portkey-integrations-models.put
      with:
        slug: tools.slug
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
    - name: bulk-delete-integration-custom-models
      description: Bulk delete integration custom models
      hints:
        readOnly: false
        destructive: true
        idempotent: true
      call: portkey-integrations-models.delete
      with:
        slug: tools.slug
        slugs: tools.slugs
      outputParameters:
      - type: object
        mapping: $.
