naftiko: 1.0.0-alpha2
info:
  label: Portkey API — MCP Servers > Capabilities
  description: 'Portkey API — MCP Servers > Capabilities. 2 operations. Lead operation: List MCP Server Capabilities. Self-contained
    Naftiko capability covering one Portkey business surface.'
  tags:
  - Portkey
  - MCP Servers > Capabilities
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    PORTKEY_API_KEY: PORTKEY_API_KEY
capability:
  consumes:
  - type: http
    namespace: portkey-mcp-servers-capabilities
    baseUri: https://api.portkey.ai/v1
    description: Portkey API — MCP Servers > Capabilities business capability. Self-contained, no shared references.
    resources:
    - name: mcp-servers-mcpServerId-capabilities
      path: /mcp-servers/{mcpServerId}/capabilities
      operations:
      - name: mcpservercapabilitieslist
        method: GET
        description: List MCP Server Capabilities
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: page
          in: query
          type: integer
        - name: page_size
          in: query
          type: integer
        - name: type
          in: query
          type: string
      - name: mcpservercapabilitiesbulkupdate
        method: PUT
        description: Bulk Update MCP Server Capabilities
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
    authentication:
      type: bearer
      token: '{{env.PORTKEY_API_KEY}}'
  exposes:
  - type: rest
    namespace: portkey-mcp-servers-capabilities-rest
    port: 8080
    description: REST adapter for Portkey API — MCP Servers > Capabilities. One Spectral-compliant resource per consumed operation,
      prefixed with /v1.
    resources:
    - path: /v1/mcp-servers/{mcpserverid}/capabilities
      name: mcp-servers-mcpserverid-capabilities
      description: REST surface for mcp-servers-mcpServerId-capabilities.
      operations:
      - method: GET
        name: mcpservercapabilitieslist
        description: List MCP Server Capabilities
        call: portkey-mcp-servers-capabilities.mcpservercapabilitieslist
        with:
          page: rest.page
          page_size: rest.page_size
          type: rest.type
        outputParameters:
        - type: object
          mapping: $.
      - method: PUT
        name: mcpservercapabilitiesbulkupdate
        description: Bulk Update MCP Server Capabilities
        call: portkey-mcp-servers-capabilities.mcpservercapabilitiesbulkupdate
        with:
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: portkey-mcp-servers-capabilities-mcp
    port: 9090
    transport: http
    description: MCP adapter for Portkey API — MCP Servers > Capabilities. One tool per consumed operation, routed inline
      through this capability's consumes block.
    tools:
    - name: list-mcp-server-capabilities
      description: List MCP Server Capabilities
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: portkey-mcp-servers-capabilities.mcpservercapabilitieslist
      with:
        page: tools.page
        page_size: tools.page_size
        type: tools.type
      outputParameters:
      - type: object
        mapping: $.
    - name: bulk-update-mcp-server-capabilities
      description: Bulk Update MCP Server Capabilities
      hints:
        readOnly: false
        destructive: false
        idempotent: true
      call: portkey-mcp-servers-capabilities.mcpservercapabilitiesbulkupdate
      with:
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
