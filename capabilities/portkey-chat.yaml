naftiko: 1.0.0-alpha2
info:
  label: Portkey API — Chat
  description: 'Portkey API — Chat. 1 operations. Lead operation: Chat. Self-contained Naftiko capability covering one Portkey
    business surface.'
  tags:
  - Portkey
  - Chat
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    PORTKEY_API_KEY: PORTKEY_API_KEY
capability:
  consumes:
  - type: http
    namespace: portkey-chat
    baseUri: https://api.portkey.ai/v1
    description: Portkey API — Chat business capability. Self-contained, no shared references.
    resources:
    - name: chat-completions
      path: /chat/completions
      operations:
      - name: createchatcompletion
        method: POST
        description: Chat
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
    authentication:
      type: bearer
      token: '{{env.PORTKEY_API_KEY}}'
  exposes:
  - type: rest
    namespace: portkey-chat-rest
    port: 8080
    description: REST adapter for Portkey API — Chat. One Spectral-compliant resource per consumed operation, prefixed with
      /v1.
    resources:
    - path: /v1/chat/completions
      name: chat-completions
      description: REST surface for chat-completions.
      operations:
      - method: POST
        name: createchatcompletion
        description: Chat
        call: portkey-chat.createchatcompletion
        with:
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: portkey-chat-mcp
    port: 9090
    transport: http
    description: MCP adapter for Portkey API — Chat. One tool per consumed operation, routed inline through this capability's
      consumes block.
    tools:
    - name: chat
      description: Chat
      hints:
        readOnly: false
        destructive: false
        idempotent: false
      call: portkey-chat.createchatcompletion
      with:
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
