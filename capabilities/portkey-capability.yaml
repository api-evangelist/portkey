naftiko: 1.0.0-alpha2
info:
  label: Portkey API
  description: The Portkey REST API. Please see https://portkey.ai/docs/api-reference for more details.
  tags:
  - Portkey
  - API
  created: '2026-05-06'
  modified: '2026-05-06'
capability:
  consumes:
  - type: http
    namespace: portkey
    baseUri: https://api.portkey.ai/v1
    description: Portkey API HTTP API.
    authentication:
      type: apikey
      in: header
      name: x-portkey-api-key
      value: '{{PORTKEY_TOKEN}}'
    resources:
    - name: chat-completions
      path: /chat/completions
      operations:
      - name: createchatcompletion
        method: POST
        description: Chat
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: realtime
      path: /realtime
      operations:
      - name: connectrealtime
        method: GET
        description: Realtime
        inputParameters:
        - name: model
          in: query
          type: string
          description: Often required for OpenAI-style realtime; other query params pass through unchanged.
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: completions
      path: /completions
      operations:
      - name: createcompletion
        method: POST
        description: Completions
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: collections
      path: /collections
      operations:
      - name: post-collections
        method: POST
        description: Create a new collection
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
      - name: get-collections
        method: GET
        description: List collections
        inputParameters:
        - name: workspace_id
          in: query
          type: string
          required: true
          description: ID or slug of the workspace
        - name: current_page
          in: query
          type: integer
          description: Page number for pagination (0-indexed)
        - name: page_size
          in: query
          type: integer
          description: Number of items per page
        - name: search
          in: query
          type: string
          description: Search query to filter collections by name
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: collections-collectionid
      path: /collections/{collectionId}
      operations:
      - name: get-collections-collectionid
        method: GET
        description: Get collection details
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
      - name: put-collections-collectionid
        method: PUT
        description: Update collection
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
      - name: delete-collections-collectionid
        method: DELETE
        description: Delete collection
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: labels
