        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
      - name: deletemodel
        method: DELETE
        description: Delete a fine-tuned model. You must have the Owner role in your organization to delete a model.
        inputParameters:
        - name: model
          in: path
          type: string
          required: true
          description: The model to delete
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
