      - name: getlabel
        method: GET
        description: Get a label by ID
        inputParameters:
        - name: labelId
          in: path
          type: string
          required: true
          description: ID of the label to retrieve
        - name: organisation_id
          in: query
          type: string
          description: ID of the organisation
        - name: workspace_id
          in: query
          type: string
          description: ID or slug of the workspace
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
      - name: updatelabel
        method: PUT
        description: Update a label
        inputParameters:
        - name: labelId
          in: path
          type: string
          required: true
          description: ID of the label to update
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
      - name: deletelabel
        method: DELETE
        description: Delete a label
        inputParameters:
        - name: labelId
          in: path
          type: string
          required: true
          description: ID of the label to delete
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
