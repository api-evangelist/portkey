          type: string
          description: ID or slug of the workspace
        - name: search
          in: query
          type: string
          description: Search query to filter labels by name
        - name: current_page
          in: query
          type: integer
          description: Page number for pagination
        - name: page_size
          in: query
          type: integer
          description: Number of items per page
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: labels-labelid
      path: /labels/{labelId}
