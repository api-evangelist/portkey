        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: promptId
          in: path
          type: string
          required: true
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
      - name: deleteprompt
        method: DELETE
        description: Delete a prompt
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: promptId
          in: path
          type: string
          required: true
