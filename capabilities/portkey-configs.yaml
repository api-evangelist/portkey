naftiko: 1.0.0-alpha2
info:
  label: Portkey API — Configs
  description: 'Portkey API — Configs. 6 operations. Lead operation: List all configs. Self-contained Naftiko capability covering
    one Portkey business surface.'
  tags:
  - Portkey
  - Configs
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    PORTKEY_API_KEY: PORTKEY_API_KEY
capability:
  consumes:
  - type: http
    namespace: portkey-configs
    baseUri: https://api.portkey.ai/v1
    description: Portkey API — Configs business capability. Self-contained, no shared references.
    resources:
    - name: configs
      path: /configs
      operations:
      - name: listconfigs
        method: GET
        description: List all configs
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
      - name: createconfig
        method: POST
        description: Create a config
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
    - name: configs-slug
      path: /configs/{slug}
      operations:
      - name: deleteconfig
        method: DELETE
        description: Delete a config
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: slug
          in: path
          type: string
          required: true
      - name: getconfig
        method: GET
        description: Get a config
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: slug
          in: path
          type: string
          required: true
      - name: updateconfig
        method: PUT
        description: Update a config
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: slug
          in: path
          type: string
          required: true
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
    - name: configs-slug-versions
      path: /configs/{slug}/versions
      operations:
      - name: listconfigversions
        method: GET
        description: List versions for a config
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: slug
          in: path
          type: string
          required: true
    authentication:
      type: bearer
      token: '{{env.PORTKEY_API_KEY}}'
  exposes:
  - type: rest
    namespace: portkey-configs-rest
    port: 8080
    description: REST adapter for Portkey API — Configs. One Spectral-compliant resource per consumed operation, prefixed
      with /v1.
    resources:
    - path: /v1/configs
      name: configs
      description: REST surface for configs.
      operations:
      - method: GET
        name: listconfigs
        description: List all configs
        call: portkey-configs.listconfigs
        outputParameters:
        - type: object
          mapping: $.
      - method: POST
        name: createconfig
        description: Create a config
        call: portkey-configs.createconfig
        with:
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/configs/{slug}
      name: configs-slug
      description: REST surface for configs-slug.
      operations:
      - method: DELETE
        name: deleteconfig
        description: Delete a config
        call: portkey-configs.deleteconfig
        with:
          slug: rest.slug
        outputParameters:
        - type: object
          mapping: $.
      - method: GET
        name: getconfig
        description: Get a config
        call: portkey-configs.getconfig
        with:
          slug: rest.slug
        outputParameters:
        - type: object
          mapping: $.
      - method: PUT
        name: updateconfig
        description: Update a config
        call: portkey-configs.updateconfig
        with:
          slug: rest.slug
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/configs/{slug}/versions
      name: configs-slug-versions
      description: REST surface for configs-slug-versions.
      operations:
      - method: GET
        name: listconfigversions
        description: List versions for a config
        call: portkey-configs.listconfigversions
        with:
          slug: rest.slug
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: portkey-configs-mcp
    port: 9090
    transport: http
    description: MCP adapter for Portkey API — Configs. One tool per consumed operation, routed inline through this capability's
      consumes block.
    tools:
    - name: list-all-configs
      description: List all configs
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: portkey-configs.listconfigs
      outputParameters:
      - type: object
        mapping: $.
    - name: create-config
      description: Create a config
      hints:
        readOnly: false
        destructive: false
        idempotent: false
      call: portkey-configs.createconfig
      with:
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
    - name: delete-config
      description: Delete a config
      hints:
        readOnly: false
        destructive: true
        idempotent: true
      call: portkey-configs.deleteconfig
      with:
        slug: tools.slug
      outputParameters:
      - type: object
        mapping: $.
    - name: get-config
      description: Get a config
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: portkey-configs.getconfig
      with:
        slug: tools.slug
      outputParameters:
      - type: object
        mapping: $.
    - name: update-config
      description: Update a config
      hints:
        readOnly: false
        destructive: false
        idempotent: true
      call: portkey-configs.updateconfig
      with:
        slug: tools.slug
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
    - name: list-versions-config
      description: List versions for a config
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: portkey-configs.listconfigversions
      with:
        slug: tools.slug
      outputParameters:
      - type: object
        mapping: $.
