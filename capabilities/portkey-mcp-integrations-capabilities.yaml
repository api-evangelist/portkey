naftiko: 1.0.0-alpha2
info:
  label: Portkey API — MCP Integrations > Capabilities
  description: 'Portkey API — MCP Integrations > Capabilities. 2 operations. Lead operation: List MCP Integration Capabilities.
    Self-contained Naftiko capability covering one Portkey business surface.'
  tags:
  - Portkey
  - MCP Integrations > Capabilities
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    PORTKEY_API_KEY: PORTKEY_API_KEY
capability:
  consumes:
  - type: http
    namespace: portkey-mcp-integrations-capabilities
    baseUri: https://api.portkey.ai/v1
    description: Portkey API — MCP Integrations > Capabilities business capability. Self-contained, no shared references.
    resources:
    - name: mcp-integrations-mcpIntegrationId-capabilities
      path: /mcp-integrations/{mcpIntegrationId}/capabilities
      operations:
      - name: mcpintegrationcapabilitieslist
        method: GET
        description: List MCP Integration Capabilities
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: page
          in: query
          type: integer
        - name: page_size
          in: query
          type: integer
        - name: type
          in: query
          type: string
      - name: mcpintegrationcapabilitiesbulkupdate
        method: PUT
        description: Bulk Update MCP Integration Capabilities
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
    authentication:
      type: bearer
      token: '{{env.PORTKEY_API_KEY}}'
  exposes:
  - type: rest
    namespace: portkey-mcp-integrations-capabilities-rest
    port: 8080
    description: REST adapter for Portkey API — MCP Integrations > Capabilities. One Spectral-compliant resource per consumed
      operation, prefixed with /v1.
    resources:
    - path: /v1/mcp-integrations/{mcpintegrationid}/capabilities
      name: mcp-integrations-mcpintegrationid-capabilities
      description: REST surface for mcp-integrations-mcpIntegrationId-capabilities.
      operations:
      - method: GET
        name: mcpintegrationcapabilitieslist
        description: List MCP Integration Capabilities
        call: portkey-mcp-integrations-capabilities.mcpintegrationcapabilitieslist
        with:
          page: rest.page
          page_size: rest.page_size
          type: rest.type
        outputParameters:
        - type: object
          mapping: $.
      - method: PUT
        name: mcpintegrationcapabilitiesbulkupdate
        description: Bulk Update MCP Integration Capabilities
        call: portkey-mcp-integrations-capabilities.mcpintegrationcapabilitiesbulkupdate
        with:
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: portkey-mcp-integrations-capabilities-mcp
    port: 9090
    transport: http
    description: MCP adapter for Portkey API — MCP Integrations > Capabilities. One tool per consumed operation, routed inline
      through this capability's consumes block.
    tools:
    - name: list-mcp-integration-capabilities
      description: List MCP Integration Capabilities
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: portkey-mcp-integrations-capabilities.mcpintegrationcapabilitieslist
      with:
        page: tools.page
        page_size: tools.page_size
        type: tools.type
      outputParameters:
      - type: object
        mapping: $.
    - name: bulk-update-mcp-integration-capabilities
      description: Bulk Update MCP Integration Capabilities
      hints:
        readOnly: false
        destructive: false
        idempotent: true
      call: portkey-mcp-integrations-capabilities.mcpintegrationcapabilitiesbulkupdate
      with:
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
